            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: persona_id
          in: query
          schema:
            $ref: "#/components/schemas/UUID"
        - name: category
          in: query
          schema:
            $ref: "#/components/schemas/EthicsCategory"
      responses:
        "200":
          description: List of audit entries

  /api/v1/ethics/violations:
    get:
      tags:
        - Ethics
      summary: List violations
      description: Retrieve a paginated list of ethics violations.
      operationId: listViolations
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: persona_id
          in: query
          schema:
            $ref: "#/components/schemas/UUID"
        - name: severity
          in: query
          schema:
            type: string
            enum: [info, low, medium, high, critical]
        - name: resolved
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of violations

  /api/v1/ethics/report:
    post:
      tags:
        - Ethics
      summary: Generate report
      description: Generate a comprehensive ethics report.
      operationId: generateEthicsReport
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                persona_id:
                  $ref: "#/components/schemas/UUID"
                start_date:
                  $ref: "#/components/schemas/Timestamp"
                end_date:
                  $ref: "#/components/schemas/Timestamp"
                include_violations:
                  type: boolean
                  default: true
                include_audits:
                  type: boolean
                  default: true
                format:
                  type: string
                  enum: [json, pdf, html]
