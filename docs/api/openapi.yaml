      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EthicsEvaluateRequest"
      responses:
        "200":
          description: Evaluation completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EthicsEvaluateResponse"

  /api/v1/ethics/audit:
